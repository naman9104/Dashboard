<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Dashboard - v8 All-Device Friendly</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f2fe;
            --danger: #ff4757;
            --pomodoro: #ff6b6b;
            --goal: #f1c40f;
        }

        /* --- GLOBAL FIXES --- */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; /* Crucial: Fixes the 100% scrollbar issue */
        }

        body {
            background: #050505;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #050505 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            height: 100dvh; /* Mobile support */
            overflow: hidden; /* Prevents whole-page scrolling */
        }

        .app-container { 
            display: flex; 
            height: 100%; 
            width: 100%;
            padding: 15px; 
            gap: 15px; 
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .brand { font-size: 1.8rem; font-weight: 900; color: var(--accent); margin-bottom: 20px; }
        .nav-btn {
            width: 100%; padding: 12px; background: none; border: 1px solid transparent;
            color: #888; text-align: left; cursor: pointer; border-radius: 12px; transition: 0.3s;
            font-weight: 600;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.05); }
        .nav-btn.active { background: var(--border); color: white; border-color: var(--accent); }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            overflow-y: auto; /* Internal scrolling only */
            height: 100%;
        }

        /* Custom Scrollbar for Main Content */
        .main-content::-webkit-scrollbar { width: 6px; }
        .main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .card {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        #clock { font-size: 4rem; font-weight: 800; text-align: center; color: var(--accent); margin-bottom: 10px; }
        
        input, textarea, select {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 10px; margin-bottom: 10px; outline: none;
        }

        .btn-action {
            background: var(--accent); color: black; border: none; padding: 10px 20px;
            border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-action:hover { opacity: 0.8; }

        .item-row {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px; background: rgba(255,255,255,0.03); 
            margin-bottom: 8px; border-radius: 10px; border: 1px solid var(--border);
        }

        section { display: none; }
        section.active { display: block; animation: fadeIn 0.4s ease; }

        /* --- RESTRICTION MODAL --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .restriction-card {
            background: #0a0a0a; border: 2px solid var(--danger);
            padding: 40px; border-radius: 24px; text-align: center; max-width: 450px;
        }

        /* --- RESPONSIVE MEDIA QUERIES --- */
        @media (max-width: 900px) {
            .app-container { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; flex-direction: row; height: auto; padding: 15px; overflow-x: auto; }
            .brand { display: none; }
            .nav-btn { width: auto; white-space: nowrap; }
            .sidebar div[style*="margin-top: auto"] { display: none; } /* Hide search in mobile sidebar */
            .main-content { height: auto; overflow: visible; }
            #clock { font-size: 2.5rem; }
        }

        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr !important; }
            .main-content { padding: 15px; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="modalOverlay" class="modal-overlay">
    <div class="restriction-card">
        <h2 style="color: var(--danger);">🔒 ACCESS BLOCKED</h2>
        <p style="margin: 20px 0;">This keyword is strictly prohibited. Please search for appropriate content.</p>
        <button class="btn-action" style="background:var(--danger); color:white;" onclick="document.getElementById('modalOverlay').style.display='none'">I Understand</button>
    </div>
</div>

<div class="app-container">
    <aside class="sidebar">
        <div class="brand">DASH.OS</div>
        <button class="nav-btn active" onclick="nav('home', this)">🏠 Home</button>
        <button class="nav-btn" onclick="nav('tracker', this)">📈 Progress</button>
        <button class="nav-btn" onclick="nav('tasks', this)">✅ Tasks</button>
        <button class="nav-btn" onclick="nav('settings', this)">⚙️ Settings</button>
        
        <div style="margin-top: auto;">
            <input type="text" id="sideSearch" placeholder="Search Browser...">
            <button class="btn-action" style="width:100%" onclick="doSearch()">Search</button>
        </div>
    </aside>

    <main class="main-content">
        <section id="home" class="active">
            <div id="clock">00:00:00</div>
            <div class="grid-2" style="display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; margin-top: 30px;">
                <div class="card">
                    <h3>Spotify Mixer</h3>
                    <select id="genreSelect" onchange="changePlaylist()">
                        <option value="37i9dQZF1DX3rxVfibe1L0">Lofi Beats</option>
                        <option value="3BmPwjUluKYBBSQUwPElxH">Hindi Raps</option>
                        <option value="37i9dQZF1DWZeKCadgRdKQ">Deep Focus</option>
                        <option value="37i9dQZF1DWXVJK4aT7pmk">Bollywood Butter</option>
                    </select>
                    <iframe id="spPlayer" style="border-radius:12px; margin-top: 10px;" 
                            src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM3M" 
                            width="100%" height="352" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>
                <div class="card">
                    <h3>Quick Notes</h3>
                    <textarea id="noteBox" style="height: 365px;" placeholder="Autosaves..."></textarea>
                </div>
            </div>
        </section>

        <section id="tracker">
            <h1>Activity Progress</h1>
            <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <h3>Log Entry</h3>
                    <input id="valInput" type="number" placeholder="Enter Value">
                    <button class="btn-action" style="width:100%" onclick="addPoint()">Add Point</button>
                </div>
                <div class="card" style="border-color: var(--goal);">
                    <h3>Target Goal</h3>
                    <input id="goalInput" type="number" placeholder="Set Goal (e.g. 70)">
                    <button class="btn-action" style="width:100%; background: var(--goal);" onclick="setGoal()">Update Goal Line</button>
                </div>
            </div>
            <div class="card">
                <canvas id="progChart" style="max-height: 400px;"></canvas>
            </div>
        </section>

        <section id="tasks">
            <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <h1>To-Do List</h1>
                    <div class="card">
                        <div style="display: flex; gap: 10px;">
                            <input id="todoIn" placeholder="New task...">
                            <button class="btn-action" onclick="addTodo()">Add</button>
                        </div>
                        <div id="todoList" style="margin-top: 20px;"></div>
                    </div>
                </div>
                <div>
                    <h1>Pomodoro</h1>
                    <div class="card" style="border: 1px solid var(--pomodoro);">
                        <div id="timer-display" style="font-size: 3rem; font-weight: 800; color: var(--pomodoro); text-align: center; margin: 15px 0;">25:00</div>
                        <div style="display: flex; gap: 10px; justify-content: center;">
                            <button class="btn-action" style="background:var(--pomodoro); color:white;" onclick="startTimer()">Start</button>
                            <button class="btn-action" style="background:#333; color:white;" onclick="pauseTimer()">Pause</button>
                            <button class="btn-action" style="background:none; border: 1px solid #444; color:white;" onclick="resetTimer()">Reset</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="settings">
            <h1>History & Privacy</h1>
            <div class="card">
                <div id="historyLog"></div>
                <button class="btn-action" style="background:var(--danger); color:white; margin-top:20px; width: 100%;" onclick="clearAllHistory()">Wipe History</button>
            </div>
        </section>
    </main>
</div>

<script>
    // --- CLOCK (FIXED) ---
    function startClock() {
        const clock = document.getElementById('clock');
        const update = () => {
            const now = new Date();
            clock.innerText = now.toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        };
        setInterval(update, 1000);
        update();
    }

    // --- NAVIGATION ---
    function nav(id, btn) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        document.querySelector('.main-content').scrollTop = 0;
    }

    // --- SEARCH ---
    const restrictedRegex = /(p.*o.*r.*n|s.*e.*x|d.*i.*c.*k|f.*u.*c.*k|p.*u.*s.*s.*y|b.*o.*o.*b.*s)/i;
    let history = JSON.parse(localStorage.getItem('sHistory')) || [];

    function doSearch() {
        const input = document.getElementById('sideSearch');
        const q = input.value.toLowerCase().trim();
        if (restrictedRegex.test(q)) {
            document.getElementById('modalOverlay').style.display = 'flex';
            input.value = '';
            return;
        }
        if(q) {
            history.unshift({id: Date.now(), term: q});
            localStorage.setItem('sHistory', JSON.stringify(history.slice(0, 15)));
            renderHistory();
            window.open(`https://www.google.com/search?q=${q}&safe=active`, '_blank');
            input.value = '';
        }
    }

    function renderHistory() {
        document.getElementById('historyLog').innerHTML = history.map(h => `
            <div class="item-row"><span>🔍 ${h.term}</span><span onclick="delHistory(${h.id})" style="color:red; cursor:pointer">DEL</span></div>
        `).join('');
    }

    function delHistory(id) {
        history = history.filter(h => h.id !== id);
        localStorage.setItem('sHistory', JSON.stringify(history));
        renderHistory();
    }

    function clearAllHistory() { history = []; localStorage.removeItem('sHistory'); renderHistory(); }

    // --- SPOTIFY ---
    function changePlaylist() {
        const id = document.getElementById('genreSelect').value;
        document.getElementById('spPlayer').src = `https://open.spotify.com/embed/playlist/${id}`;
    }

    // --- CHART ---
    let labels = JSON.parse(localStorage.getItem('pLabels')) || [];
    let dataPts = JSON.parse(localStorage.getItem('pData')) || [];
    let userGoal = localStorage.getItem('pGoal') ? Number(localStorage.getItem('pGoal')) : null;

    const ctx = document.getElementById('progChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { 
            labels: labels, 
            datasets: [
                { label:'Progress', data:dataPts, borderColor:'#00f2fe', tension:0.3, fill:true, backgroundColor:'rgba(0,242,254,0.05)' },
                { label:'Goal', data: labels.map(() => userGoal), borderColor:'#f1c40f', borderDash:, pointRadius:0, fill:false, borderWidth:2 }
            ] 
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    function addPoint() {
        const v = document.getElementById('valInput').value;
        if(v) {
            labels.push(new Date().toLocaleDateString([], {month:'short', day:'numeric'}));
            dataPts.push(Number(v));
            localStorage.setItem('pLabels', JSON.stringify(labels));
            localStorage.setItem('pData', JSON.stringify(dataPts));
            updateChart();
            document.getElementById('valInput').value = '';
        }
    }

    function setGoal() {
        const g = document.getElementById('goalInput').value;
        if(g) { userGoal = Number(g); localStorage.setItem('pGoal', g); updateChart(); }
    }

    function updateChart() {
        chart.data.datasets.data = labels.map(() => userGoal);
        chart.update();
    }

    // --- POMODORO ---
    let timeLeft = 25 * 60;
    let timerId = null;
    function startTimer() {
        if(timerId) return;
        timerId = setInterval(() => {
            timeLeft--;
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${mins}:${secs < 10 ? '0'+secs : secs}`;
            if(timeLeft <= 0) { clearInterval(timerId); alert("Session over!"); resetTimer(); }
        }, 1000);
    }
    function pauseTimer() { clearInterval(timerId); timerId = null; }
    function resetTimer() { pauseTimer(); timeLeft = 25 * 60; document.getElementById('timer-display').innerText = "25:00"; }

    // --- TASKS & NOTES ---
    const noteBox = document.getElementById('noteBox');
    noteBox.value = localStorage.getItem('myNotes') || '';
    noteBox.addEventListener('input', () => localStorage.setItem('myNotes', noteBox.value));

    let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];
    function renderTasks() {
        document.getElementById('todoList').innerHTML = tasks.map((t, i) => `
            <div class="item-row"><span>${t}</span><span onclick="delTask(${i})" style="color:red; cursor:pointer">✖</span></div>
        `).join('');
    }
    function addTodo() {
        const v = document.getElementById('todoIn').value;
        if(v) { tasks.push(v); localStorage.setItem('myTasks', JSON.stringify(tasks)); renderTasks(); document.getElementById('todoIn').value=''; }
    }
    function delTask(i) { tasks.splice(i,1); localStorage.setItem('myTasks', JSON.stringify(tasks)); renderTasks(); }

    // --- START APP ---
    startClock();
    renderHistory();
    renderTasks();
    updateChart();
</script>
</body>
</html>
